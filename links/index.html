<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links — Adarsh Mishra</title>
  <meta name="description" content="A curated directory of useful websites, organized by category." />
  <style>
    :root { --radius: 20px; }
    [data-theme="night"] {
      --bg-gradient: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #6a3093, #1a2980);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.18);
      --divider: rgba(255, 255, 255, 0.16);
      --fav-bg: rgba(255, 255, 255, 0.92);
      --nav-active: rgba(255, 255, 255, 0.12);
      --panel-solid: #1b1830;
      --text: #f5f6ff; --text-dim: rgba(245, 246, 255, 0.68);
    }
    [data-theme="day"] {
      --bg-gradient: linear-gradient(-45deg, #c4b5fd, #e9c5f0, #c6dcf7, #bdf0d6, #f7d6c4);
      --card-bg: rgba(255, 255, 255, 0.42);
      --card-border: rgba(255, 255, 255, 0.65);
      --divider: rgba(44, 35, 86, 0.18);
      --fav-bg: #ffffff;
      --nav-active: rgba(255, 255, 255, 0.6);
      --panel-solid: #efe9fb;
      --text: #2c2356; --text-dim: rgba(44, 35, 86, 0.7);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text); min-height: 100vh;
      background: var(--bg-gradient); background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
      display: flex; flex-direction: column; transition: color 0.5s ease;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:26px clamp(20px,5vw,48px); }
    .home-link { display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); font-weight:600; font-size:.95rem; padding:9px 16px; border-radius:999px; background:var(--card-bg); border:1px solid var(--card-border); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); transition:transform .2s ease; }
    .home-link:hover { transform:translateX(-3px); }
    .theme-toggle { display:flex; gap:2px; padding:4px; border-radius:999px; background:var(--card-bg); border:1px solid var(--card-border); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
    .theme-toggle button { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; border-radius:50%; cursor:pointer; color:var(--text-dim); transition:background .25s ease,color .25s ease; }
    .theme-toggle button svg { width:19px; height:19px; }
    .theme-toggle button:hover { color:var(--text); }
    .theme-toggle button.active { color:#fff; background:linear-gradient(135deg,#ff6ec4,#7873f5); box-shadow:0 4px 14px rgba(120,115,245,.45); }

    .page-head { text-align:center; padding:8px 24px 20px; }
    .page-head h1 { font-size:clamp(2rem,5vw,3rem); font-weight:800; letter-spacing:-1px; background:linear-gradient(90deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 6s linear infinite; }
    @keyframes shimmer { to { background-position:200% center; } }
    .page-head p { margin-top:12px; color:var(--text-dim); font-size:1.02rem; }

    .search-wrap { width:100%; max-width:520px; margin:6px auto 0; padding:0 24px; }
    .search-wrap input { width:100%; font:inherit; font-size:1rem; color:var(--text); padding:13px 18px; border-radius:999px; background:var(--card-bg); border:1px solid var(--card-border); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); outline:none; }
    .search-wrap input::placeholder { color:var(--text-dim); }
    .search-wrap input:focus { border-color:rgba(255,255,255,.45); }

    .layout { display:flex; align-items:flex-start; gap:28px; width:100%; max-width:1200px; margin:0 auto; padding:24px clamp(20px,5vw,48px) 70px; }
    main { flex:1; min-width:0; }

    .category { margin-bottom:42px; scroll-margin-top:24px; }
    .cat-head { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
    .cat-dot { width:14px; height:14px; border-radius:5px; flex-shrink:0; }
    .cat-head h2 { font-size:1.35rem; font-weight:700; }
    .cat-count { font-size:.85rem; color:var(--text-dim); font-weight:500; }
    .cat-note { color:var(--text-dim); font-size:.9rem; margin:0 0 6px 26px; }
    .cat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(265px,1fr)); gap:14px; margin-top:14px; }

    .link-item { display:flex; flex-direction:row; align-items:flex-start; gap:14px; text-decoration:none; color:var(--text); padding:16px 18px; border-radius:14px; background:var(--card-bg); border:1px solid var(--card-border); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); position:relative; overflow:hidden; transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease; }
    .link-item::before { content:""; position:absolute; inset:0; background:var(--accent); opacity:0; transition:opacity .2s ease; }
    .link-item:hover { transform:translateY(-3px); border-color:rgba(255,255,255,.4); box-shadow:0 10px 24px rgba(0,0,0,.3); }
    .link-item:hover::before { opacity:.12; }
    .link-item > * { position:relative; z-index:1; }
    .fav { width:54px; height:54px; border-radius:13px; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; background:var(--fav-bg); overflow:hidden; }
    .fav img { width:36px; height:36px; object-fit:contain; }
    .fav .mono { display:none; width:100%; height:100%; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1.5rem; background:var(--accent); }
    .fav.noimg { background:transparent; }
    .fav.noimg img { display:none; }
    .fav.noimg .mono { display:flex; }
    .link-body { flex:1; min-width:0; display:flex; flex-direction:column; }
    .lname { font-weight:700; font-size:1rem; line-height:1.3; }
    .ldiv { height:1px; background:var(--divider); margin:10px 0; }
    .ldesc { font-size:.85rem; color:var(--text-dim); line-height:1.45; }

    .no-results { text-align:center; color:var(--text-dim); padding:40px; display:none; }

    /* Left sidebar column (desktop: in-flow, never overlaps) */
    .cat-nav { position:sticky; top:24px; align-self:flex-start; width:216px; flex-shrink:0; max-height:calc(100vh - 48px); overflow-y:auto; padding:16px; border-radius:16px; background:var(--card-bg); border:1px solid var(--card-border); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); opacity:0; visibility:hidden; transform:translateX(-8px); transition:opacity .3s ease, transform .3s ease, visibility .3s ease; }
    .cat-nav.visible { opacity:1; visibility:visible; transform:translateX(0); }
    .cat-nav .nav-title { font-size:.72rem; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); margin:2px 8px 12px; }
    .cat-nav a { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; text-decoration:none; color:var(--text-dim); font-size:.88rem; font-weight:600; transition:background .2s ease, color .2s ease; }
    .cat-nav a:hover, .cat-nav a.active { color:var(--text); background:var(--nav-active); }
    .cat-nav .nav-dot { width:11px; height:11px; border-radius:3px; flex-shrink:0; }
    .cat-nav .nav-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Floating circular buttons */
    .to-top, .nav-toggle {
      position:fixed; bottom:20px; z-index:120; width:52px; height:52px;
      display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; border-radius:50%; color:#fff;
      opacity:0; visibility:hidden; transform:translateY(10px);
      transition:opacity .3s ease, transform .3s ease, visibility .3s ease;
    }
    .to-top { right:20px; background:linear-gradient(135deg,#ff6ec4,#7873f5); box-shadow:0 6px 20px rgba(120,115,245,.5); }
    .nav-toggle { left:20px; display:none; background:linear-gradient(135deg,#7873f5,#4facfe); box-shadow:0 6px 20px rgba(79,172,254,.5); }
    .to-top.visible, .nav-toggle.visible { opacity:1; visibility:visible; transform:translateY(0); }
    .to-top:hover, .nav-toggle:hover { filter:brightness(1.08); }
    .to-top svg { width:22px; height:22px; }
    .nav-toggle svg { width:24px; height:24px; }

    .nav-backdrop { position:fixed; inset:0; z-index:115; background:rgba(0,0,0,.5); opacity:0; visibility:hidden; transition:opacity .3s ease, visibility .3s ease; }
    .nav-backdrop.open { opacity:1; visibility:visible; }

    /* Mobile: sidebar becomes an off-canvas drawer toggled by the hamburger */
    @media (max-width:900px){
      .layout{ padding-top:18px; }
      .cat-nav, .cat-nav.visible {
        position:fixed; top:0; left:0; bottom:0; height:100dvh; z-index:125;
        width:min(82vw,300px); max-height:none; align-self:auto;
        border-radius:0 18px 18px 0; padding:20px;
        background:var(--panel-solid);
        opacity:1; visibility:visible;
        transform:translateX(-106%);
        transition:transform .32s ease;
      }
      .cat-nav.open { transform:translateX(0); box-shadow:0 0 44px rgba(0,0,0,.55); }
      .nav-toggle { display:flex; }
    }
    @media (min-width:901px){ .nav-backdrop, .nav-toggle { display:none; } }
    @media (max-width:520px){ .cat-grid{ grid-template-columns:1fr; } .topbar{ flex-wrap:wrap; } }
  </style>
</head>

  <script>
    (function () {
      var DAY_START=7, NIGHT_START=19;
      function resolved(m){ if(m==="day"||m==="night")return m; var h=new Date().getHours(); return (h>=DAY_START&&h<NIGHT_START)?"day":"night"; }
      function getMode(){ try{return localStorage.getItem("themeMode")||"auto";}catch(e){return "auto";} }
      function apply(m){ document.documentElement.setAttribute("data-theme",resolved(m)); document.querySelectorAll(".theme-toggle button").forEach(function(b){ b.classList.toggle("active",b.dataset.mode===m); }); }
      document.querySelectorAll(".theme-toggle button").forEach(function(btn){ btn.addEventListener("click",function(){ var m=btn.dataset.mode; try{localStorage.setItem("themeMode",m);}catch(e){} apply(m); }); });
      apply(getMode());
      setInterval(function(){ if(getMode()==="auto") apply("auto"); },60000);
    })();

    function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function hostOf(url){ try { return new URL(url).hostname; } catch(e){ return ""; } }
    function isIP(h){ return /^\d{1,3}(\.\d{1,3}){3}$/.test(h); }
    function monoChar(name){ var m=(name||"").replace(/[^A-Za-z0-9]/,"").charAt(0); return (m||"#").toUpperCase(); }

    var main = document.getElementById("main");
    var nav = document.getElementById("cat-nav");
    nav.innerHTML = '<div class="nav-title">Categories</div>';

    DATA.forEach(function(cat){
      var sec = document.createElement("section");
      sec.className = "category"; sec.id = "cat-" + cat.key; sec.dataset.cat = cat.key;
      var noteHtml = cat.note ? '<p class="cat-note">'+cat.note+'</p>' : '';
      sec.innerHTML =
        '<div class="cat-head"><span class="cat-dot" style="background:'+cat.accent+'"></span>'+
        '<h2>'+cat.title+'</h2><span class="cat-count">'+cat.items.length+'</span></div>'+ noteHtml +
        '<div class="cat-grid"></div>';
      var grid = sec.querySelector(".cat-grid");
      cat.items.forEach(function(it){
        var host = hostOf(it.url);
        var useImg = host && !isIP(host);
        var a = document.createElement("a");
        a.className = "link-item";
        a.href = it.url; a.target = "_blank"; a.rel = "noopener noreferrer";
        a.style.setProperty("--accent", cat.accent);
        a.dataset.search = ((it.name||"")+" "+(it.desc||"")).toLowerCase();
        var favCls = useImg ? "fav" : "fav noimg";
        var imgHtml = useImg ? '<img src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(host)+'&sz=128" alt="" loading="lazy" onerror="this.parentNode.classList.add(\'noimg\')">' : '';
        a.innerHTML =
          '<span class="'+favCls+'" style="--accent:'+cat.accent+'">'+imgHtml+'<span class="mono">'+monoChar(it.name)+'</span></span>'+
          '<span class="link-body"><span class="lname">'+esc(it.name)+'</span><span class="ldiv"></span><span class="ldesc">'+esc(it.desc)+'</span></span>';
        grid.appendChild(a);
      });
      main.appendChild(sec);

      var na = document.createElement("a");
      na.href = "#cat-" + cat.key; na.dataset.target = "cat-" + cat.key;
      na.innerHTML = '<span class="nav-dot" style="background:'+cat.accent+'"></span><span class="nav-name">'+cat.title+'</span>';
      nav.appendChild(na);
    });

    var navLinks = Array.prototype.slice.call(nav.querySelectorAll("a"));
    var sections = DATA.map(function(c){ return document.getElementById("cat-"+c.key); });
    var toTopBtn = document.getElementById("to-top");
    var navToggle = document.getElementById("nav-toggle");
    var backdrop = document.getElementById("nav-backdrop");

    function openNav(){ nav.classList.add("open"); backdrop.classList.add("open"); }
    function closeNav(){ nav.classList.remove("open"); backdrop.classList.remove("open"); }
    navToggle.addEventListener("click", function(){ nav.classList.contains("open") ? closeNav() : openNav(); });
    backdrop.addEventListener("click", closeNav);
    navLinks.forEach(function(l){ l.addEventListener("click", closeNav); });
    toTopBtn.addEventListener("click", function(){ window.scrollTo({top:0,behavior:"smooth"}); });

    var ticking = false;
    function onScroll(){
      if(ticking) return; ticking = true;
      requestAnimationFrame(function(){
        var show = window.scrollY > 280;
        nav.classList.toggle("visible", show);
        toTopBtn.classList.toggle("visible", show);
        navToggle.classList.toggle("visible", show);
        if(!show) closeNav();
        var pos = window.scrollY + 150, active = sections[0];
        sections.forEach(function(s){ if(s && s.offsetTop <= pos) active = s; });
        navLinks.forEach(function(l){ l.classList.toggle("active", active && l.dataset.target === active.id); });
        ticking = false;
      });
    }
    window.addEventListener("scroll", onScroll, {passive:true});
    onScroll();

    var search = document.getElementById("search");
    var noRes = document.getElementById("no-results");
    search.addEventListener("input", function(){
      var q = search.value.trim().toLowerCase();
      var anyVisible = false;
      document.querySelectorAll(".category").forEach(function(sec){
        var shown = 0;
        sec.querySelectorAll(".link-item").forEach(function(el){
          var match = !q || el.dataset.search.indexOf(q) !== -1;
          el.style.display = match ? "" : "none";
          if(match) shown++;
        });
        sec.style.display = shown ? "" : "none";
        if(shown) anyVisible = true;
      });
      noRes.style.display = anyVisible ? "none" : "block";
    });
  </script>
